seed: 42
num_steps_per_env: 128
max_iterations: 250
obs_groups:
  actor: !!python/tuple
  - actor
  critic: !!python/tuple
  - critic
save_interval: 50
experiment_name: mjlab
run_name: ppo_edit_timeout
logger: wandb
wandb_project: mjlab
wandb_tags: !!python/tuple []
resume: false
load_run: .*
load_checkpoint: model_.*.pt
clip_actions: null
upload_model: false
class_name: OnPolicyRunner
actor:
  hidden_dims: !!python/tuple
  - 64
  - 64
  activation: swish
  obs_normalization: true
  cnn_cfg: null
  distribution_cfg:
    class_name: TanhGaussianDistribution
    init_std: 0.7
    std_type: log
    std_range: !!python/tuple
    - 0.0001
    - 10.0
    action_range: !!python/tuple
    - -1.0
    - 1.0
  rnn_type: null
  rnn_hidden_dim: 256
  rnn_num_layers: 1
  class_name: LayerNormMLPModel
critic:
  hidden_dims: !!python/tuple
  - 128
  - 128
  activation: swish
  obs_normalization: true
  num_bins: 151
  vmin: -5.0
  vmax: 10.0
  sigma_ratio: 0.75
  zero_init_scale: 40.0
  class_name: ActionValueModel
algorithm:
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.001
  gamma: 0.99
  lam: 0.95
  max_grad_norm: 1.0
  desired_kl: 0.01
  target_entropy: -1.0
  init_alpha_temp: 0.1
  init_alpha_kl: 0.1
  num_kl_samples: 4
  optimizer: adamw
  weight_decay: 0.001
  adam_betas: !!python/tuple
  - 0.9
  - 0.95
  rnd_cfg: null
  symmetry_cfg: null
  class_name: REPPO
