seed: 42
num_steps_per_env: 1
max_iterations: 10000
obs_groups:
  actor: !!python/tuple
  - actor
  critic: !!python/tuple
  - critic
save_interval: 500
experiment_name: mjlab
run_name: sac_edit_timeout
logger: wandb
wandb_project: mjlab
wandb_tags: !!python/tuple []
resume: false
load_run: .*
load_checkpoint: model_.*.pt
clip_actions: null
upload_model: false
class_name: OnPolicyRunner
actor:
  hidden_dims: !!python/tuple
  - 256
  - 256
  activation: elu
  obs_normalization: false
  init_noise_std: 1.0
  layer_norm: false
  log_std_min: -20.0
  log_std_max: 2.0
  action_low: -1.0
  action_high: 1.0
  class_name: SACActorModel
critic:
  hidden_dims: !!python/tuple
  - 256
  - 256
  activation: elu
  obs_normalization: false
  layer_norm: false
  class_name: SACCriticModel
algorithm:
  replay_buffer_size: 1000000
  num_learning_epochs: 1
  num_mini_batches: 16
  mini_batch_size: 256
  actor_learning_rate: 0.0003
  critic_learning_rate: 0.0003
  alpha_learning_rate: 0.0003
  actor_optimizer: adam
  critic_optimizer: adam
  auto_alpha: true
  alpha: 0.05
  tau: 0.005
  gamma: 0.99
  target_entropy_scale: 1.0
  max_grad_norm: 1.0
  policy_frequency: 2
  n_steps: 3
  rnd_cfg: null
  symmetry_cfg: null
  class_name: SAC
start_training: 0
